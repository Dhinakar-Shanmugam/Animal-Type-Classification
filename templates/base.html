<!DOCTYPE html>
<html>

<head>

<title>ATC AI System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<!-- Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
}

/* NAVBAR */
.navbar {
    background: linear-gradient(90deg, #0f3d2e, #14532d);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

/* BRAND */
.navbar-brand {
    font-size: 1.5rem;
    color: #00ff9c !important;
}

/* NAV LINKS */
.nav-link {
    color: #c8facc !important;
    transition: 0.3s;
}

.nav-link:hover {
    color: #00ff9c !important;
    transform: translateY(-2px);
}

/* USER NAME */
.nav-link.text-info {
    color: #00ff9c !important;
    font-weight: 600;
}

/* BUTTONS */
.btn-success {
    background: linear-gradient(45deg, #00ff9c, #00c853);
    border: none;
}

.btn-success:hover {
    transform: scale(1.05);
}

.btn-danger {
    background: linear-gradient(45deg, #ff4d4d, #b30000);
    border: none;
}

/* FOOTER */
footer {
    background: linear-gradient(90deg, #0f2027, #203a43);
    color: #aaa;
}

/* PAGE FADE ANIMATION */
.page-enter {
    animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

<body class="d-flex flex-column min-vh-100 page-enter">

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand fw-bold" href="/">
    🐄 ATC AI
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
    <span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navMenu">

<ul class="navbar-nav ms-auto align-items-center">

    {% if current_user.is_authenticated %}

    <!-- Dashboard -->
    <li class="nav-item">
        <a class="nav-link" href="/">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
    </li>

    <!-- Analyze -->
    <li class="nav-item">
        <a class="nav-link" href="/analyze">
            <i class="bi bi-camera"></i> Analyze
        </a>
    </li>

    <!-- Records -->
    <li class="nav-item">
        <a class="nav-link" href="/records">
            <i class="bi bi-table"></i> Records
        </a>
    </li>

    <!-- User -->
    <li class="nav-item ms-3">
        <span class="nav-link text-info">
            👤 {{ current_user.username }}
        </span>
    </li>

    <!-- Logout -->
    <li class="nav-item">
        <a class="btn btn-danger ms-2 px-3" href="/logout">
            Logout
        </a>
    </li>

    {% else %}

    <!-- Login -->
    <li class="nav-item">
        <a class="nav-link" href="/login">
            <i class="bi bi-box-arrow-in-right"></i> Login
        </a>
    </li>

    <!-- Signup -->
    <li class="nav-item">
        <a class="btn btn-success ms-2 px-3" href="/signup">
            Signup
        </a>
    </li>

    {% endif %}

</ul>

</div>

</div>

</nav>

<!-- 🔥 PAGE CONTENT -->
<div class="flex-grow-1">
{% block content %}{% endblock %}
</div>

<!-- 🔥 FOOTER -->
<footer class="text-center p-3 mt-auto">
    <small>
        🌱 ATC AI System | Smart Dairy Intelligence | &copy; 2026
    </small>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
