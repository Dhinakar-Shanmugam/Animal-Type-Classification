{% extends "base.html" %}

{% block content %}

<div class="container mt-5 mb-5">

<div class="row justify-content-center">

    <!-- CENTER CARD -->
    <div class="col-md-6">

        <div class="glass-card shadow-lg p-4 text-center">

            <h2 class="mb-4 fw-bold">📷 Upload Animal Image</h2>

            <form id="analyzeForm" action="/analyze" method="POST" enctype="multipart/form-data">

                <!-- IMAGE PREVIEW BOX -->
                <div class="mb-3 d-flex flex-column align-items-center justify-content-center"
                     style="
                     height: 260px;
                     border: 2px dashed #00c853;
                     border-radius: 12px;
                     position: relative;
                     overflow: hidden;
                     ">

                    <!-- PREVIEW IMAGE -->
                    <img id="previewImage"
                         src="{{ url_for('static', filename='images/upload.png') }}"
                         style="
                         max-height: 100%;
                         max-width: 100%;
                         object-fit: contain;
                         display: block;
                         ">

                    <!-- DEFAULT TEXT -->
                    <p id="uploadText"
                       style="
                       position: absolute;
                       bottom: 10px;
                       color: #ccc;
                       font-size: 14px;
                       ">
                        📂 Click below to upload image
                    </p>

                </div>

                <!-- FILE INPUT -->
                <input type="file" name="file" class="form-control mt-3" required
                       onchange="previewFile(event)">

                <!-- BUTTON -->
                <button type="submit" class="btn btn-success mt-4 w-100 py-2 fw-bold">
                    🚀 Upload & Analyze
                </button>

            </form>

            <!-- LOADING -->
            <div id="loadingSpinner" class="text-center mt-4" style="display: none;">
                <div class="spinner-border text-success" style="width: 4rem; height: 4rem;"></div>
                <p class="mt-3 fs-5">🤖 AI is analyzing your image...</p>
            </div>

        </div>

    </div>

</div>

</div>

<!-- SCRIPTS -->
<script>

// IMAGE PREVIEW FIX
function previewFile(event) {
    const image = document.getElementById("previewImage");
    const text = document.getElementById("uploadText");

    image.src = URL.createObjectURL(event.target.files[0]);

    // Hide text after selecting image
    text.style.display = "none";
}

// LOADING
const form = document.getElementById("analyzeForm");
const spinner = document.getElementById("loadingSpinner");

form.addEventListener("submit", function() {
    spinner.style.display = "block";
});

</script>

{% endblock %}
