{% extends "base.html" %}

{% block content %}

<div class="container d-flex align-items-center justify-content-center vh-100">

    <div class="col-md-5 col-lg-4">

        <div class="glass-card p-5 text-center"
             style="
             background: linear-gradient(135deg, #0f3d2e, #14532d);
             border: 1px solid rgba(0, 230, 118, 0.3);
             box-shadow: 0 10px 40px rgba(0, 230, 118, 0.2);
             ">

            <!-- TITLE -->
            <h2 class="mb-3" style="color:#00ff9c;">
                🔐 Welcome Back
            </h2>

            <p class="text-light mb-4">
                Login to access your dashboard
            </p>

            <!-- FORM -->
            <form method="POST">

                <input name="username"
                       class="form-control mt-3"
                       placeholder="Username"
                       required>

                <input type="password"
                       name="password"
                       class="form-control mt-3"
                       placeholder="Password"
                       required>

                <button class="btn btn-custom w-100 mt-4">
                    🚀 Login
                </button>

            </form>

            <!-- ERROR -->
            {% if error %}
            <div class="mt-3 p-2 rounded"
                 style="background: rgba(255,0,0,0.2); color:#ff6b6b;">
                {{ error }}
            </div>
            {% endif %}

            <!-- SIGNUP LINK -->
            <p class="mt-4 text-light">
                Don't have an account?
                <a href="/signup" class="text-success fw-bold">
                    Signup
                </a>
            </p>

        </div>

    </div>

</div>

{% endblock %}
