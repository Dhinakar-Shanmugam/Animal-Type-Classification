{% extends "base.html" %}

{% block content %}

<div class="container mt-5 mb-5">

<h2 class="text-center">Previous ATC Records</h2>

<table class="table table-striped table-dark mt-4">

<thead>

<tr>
<th>S.No</th>
<th>Animal</th>
<th>ATC Score</th>
<th>Date</th>
<th>Animal ID</th>
</tr>

</thead>

<tbody>

{% for item in records %}

<tr>

<td>{{ loop.index }}</td>

<td>{{ item.animal }}</td>

<td>{{ item.atc["Total Score"] }}</td>

<td>{{ item.date_time }}</td>

<td>{{ item._id }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
